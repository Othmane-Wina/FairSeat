version: "3.9"

# Réseau partagé — tous les services se parlent via ce réseau
networks:
  fairseat-net:
    driver: bridge

# Volumes nommés — les données persistent entre les redémarrages
volumes:
  identity_db_data:
  discovery_db_data:
  booking_db_data:
  marketplace_db_data:
  ticket_db_data:
  redis_data:
  kafka_data:

services:

  # ─────────────────────────────────────────
  # BASE DE DONNÉES 1 — Identity Service
  # ─────────────────────────────────────────
  identity_db:
    image: postgres:16-alpine
    container_name: identity_db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"            # port local:port conteneur
    volumes:
      - identity_db_data:/var/lib/postgresql/data
      - ./db/init/01_identity.sql:/docker-entrypoint-initdb.d/01_identity.sql
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BASE DE DONNÉES 2 — Discovery Service
  # ─────────────────────────────────────────
  discovery_db:
    image: postgres:16-alpine
    container_name: discovery_db
    environment:
      POSTGRES_DB: discovery_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"            # port LOCAL différent (5433) !
    volumes:
      - discovery_db_data:/var/lib/postgresql/data
      - ./db/init/02_discovery.sql:/docker-entrypoint-initdb.d/02_discovery.sql
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d discovery_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BASE DE DONNÉES 3 — Booking Service
  # ─────────────────────────────────────────
  booking_db:
    image: postgres:16-alpine
    container_name: booking_db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data
      - ./db/init/03_booking.sql:/docker-entrypoint-initdb.d/03_booking.sql
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BASE DE DONNÉES 4 — Marketplace Service
  # ─────────────────────────────────────────
  marketplace_db:
    image: postgres:16-alpine
    container_name: marketplace_db
    environment:
      POSTGRES_DB: marketplace_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - marketplace_db_data:/var/lib/postgresql/data
      - ./db/init/04_marketplace.sql:/docker-entrypoint-initdb.d/04_marketplace.sql
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d marketplace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # BASE DE DONNÉES 5 — Ticket Service
  # ─────────────────────────────────────────
  ticket_db:
    image: postgres:16-alpine
    container_name: ticket_db
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
      - ./db/init/05_ticket.sql:/docker-entrypoint-initdb.d/05_ticket.sql
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS — Cache, Queue, Sessions
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1 --databases 4
    # --save 60 1 : sauvegarde sur disque toutes les 60s si au moins 1 changement
    # --databases 4 : 4 bases logiques (DB0=queue, DB1=sessions, DB2=cache, DB3=locks)
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA — Message Broker (mode KRaft, sans Zookeeper)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: kafka
    ports:
        - "9092:9092"
    environment:
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
        # Notice the added CONTROLLER:PLAINTEXT at the very end of this next line:
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
        - kafka_data:/var/lib/kafka/data
    networks:
      - fairseat-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # KEYCLOAK — Identity Provider
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - fairseat-net
    depends_on:
      identity_db:
        condition: service_healthy

