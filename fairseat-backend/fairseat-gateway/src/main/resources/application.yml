server:
  port: 8090

spring:
  application:
    name: fairseat-gateway
  main:
    lazy-initialization: true

  cloud:
    gateway:
      routes:

        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v1/identity/**
          filters:
            - StripPrefix=0

        - id: queue-service
          uri: ${QUEUE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v1/queue/**
          filters:
            - StripPrefix=0

        - id: discovery-service
          uri: ${DISCOVERY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v1/games/**
          filters:
            - StripPrefix=0

        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v1/bookings/**
          filters:
            - StripPrefix=0

        - id: ticket-service
          uri: ${TICKET_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/v1/tickets/**
          filters:
            - StripPrefix=0

        - id: marketplace-service
          uri: ${MARKETPLACE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/v1/marketplace/**
          filters:
            - StripPrefix=0

        - id: identity-dev-otp
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v1/identity/dev/**
          # Route publique — pas de JWT requis pour les tests K6

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URI:http://localhost:8080}/realms/fairseat/protocol/openid-connect/certs

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
