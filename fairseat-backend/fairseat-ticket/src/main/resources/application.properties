# ── Database ────────────────────────────────────────────────────
spring.application.name=fairseat-ticket
server.port=8085
spring.datasource.url=jdbc:postgresql://localhost:5436/ticket_db
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── Kafka ────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Consumer pour admission-events (Strings depuis Queue Service)
spring.kafka.consumer.group-id=ticket-generation-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=\
  org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.pfa.fairseatticket.event.BookingConfirmedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
# Producer (si le Ticket Service publie aussi des événements)
spring.kafka.producer.key-serializer=\
  org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=\
  org.springframework.kafka.support.serializer.JsonSerializer

spring.data.redis.host=localhost
spring.data.redis.port=6379