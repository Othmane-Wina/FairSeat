version: '3.8'

services:
  # Multi-Database PostgreSQL Service for FairSeat
  fairseat-postgres:
    image: postgres:16-alpine
    container_name: fairseat-postgres-container
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fairseat_default_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - fairseat-network

volumes:
  postgres_data:

networks:
  fairseat-network:
    driver: bridge